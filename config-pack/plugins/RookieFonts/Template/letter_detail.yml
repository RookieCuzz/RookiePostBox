# 模板ID
id: letter_detail

# 全局设置
global:
  # 默认行间距
  ls: 11px
  # 默认字间距
  ws: 1px
  ttf: "minecraft:cube10.ttf"
  oversample: 5.0
  size: 8.0

# 具体信件预览布局
layout:
  # 背景纸张
  - { "block": 1, "position": [ 0, 0 ], "influence": true, "indent": 0px, "ls": 0px, "ws": 0px, "text": "{shift:-30}%letterPaper%{shift:-210}" }

  # 左上：称呼
  - { "block": 2, "position": [ 0, 22 ], "influence": true, "indent": 25px, "ls": 11px, "ws": 10px, "text": "亲爱的%receiverName%：" }

  # 中间大区域：信件文本，RookiePostBox 负责按行写入这些占位符
  - { "block": 3, "position": [ 35, 36 ], "influence": true, "indent": 0px, "ls": 11px, "ws": 1px, "text": "%mailTextLine1%" }
  - { "indent": -10px, "ls": 11px, "ws": 1px, "text": "%mailTextLine2%" }
  - { "indent": -10px, "ls": 11px, "ws": 1px, "text": "%mailTextLine3%" }
  - { "indent": -10px, "ls": 11px, "ws": 1px, "text": "%mailTextLine4%" }
  - { "indent": 0px, "ls": 11px, "ws": 1px, "text": "%mailTextLine5%" }
  - { "indent": 0px, "ls": 11px, "ws": 1px, "text": "%mailTextLine6%" }

  # 附件区域标题，真实九宫格物品由 RookiePostBox 的 Inventory 槽位承载
  - { "block": 4, "position": [ 60, 80 ], "influence": true, "indent": -40px, "ls": 11px, "ws": 1px, "text": "附件：" }

  # 右下：落款
  - { "block": 5, "position": [ 160, 100 ], "influence": true, "indent": -45px, "ls": 11px, "ws": 1px, "text": "—— %senderName%" }
  - { "indent": -40px, "ls": 11px, "ws": 1px, "text": "%sentAt%" }

images:
  letterPaper:
    height: 160
    ascent: 34
    char: "\uE000"
    file: "font/letter"
    blocks:
      - 1
  ascii:
    height: 8
    ascent: 6
    file: "font/ascii_custom"
    chars:
      - "\u0000\u0000\u0000\u0000\u0000\u0000\u0000\u0000\u0000\u0000\u0000\u0000\u0000\u0000\u0000\u0000"
      - "\u0000\u0000\u0000\u0000\u0000\u0000\u0000\u0000\u0000\u0000\u0000\u0000\u0000\u0000\u0000\u0000"
      - "\u0020\u0021\u0022\u0023\u0024\u0025\u0026\u0027\u0028\u0029\u002a\u002b\u002c\u002d\u002e\u002f"
      - "\u0030\u0031\u0032\u0033\u0034\u0035\u0036\u0037\u0038\u0039\u003a\u003b\u003c\u003d\u003e\u003f"
      - "\u0040\u0041\u0042\u0043\u0044\u0045\u0046\u0047\u0048\u0049\u004a\u004b\u004c\u004d\u004e\u004f"
      - "\u0050\u0051\u0052\u0053\u0054\u0055\u0056\u0057\u0058\u0059\u005a\u005b\u005c\u005d\u005e\u005f"
      - "\u0060\u0061\u0062\u0063\u0064\u0065\u0066\u0067\u0068\u0069\u006a\u006b\u006c\u006d\u006e\u006f"
      - "\u0070\u0071\u0072\u0073\u0074\u0075\u0076\u0077\u0078\u0079\u007a\u007b\u007c\u007d\u007e\u0000"
