# 模板ID
id: letter
# 全局设置
global:
  # 行间距
  ls: 10px
  # 字间距
  ws: 2px
  ttf: "minecraft:cube10.ttf"
  oversample: 5.0
  size: 8.0
# 模板内容布局
layout:
  # 严格使用Json格式，避免不必要的问题
  # block - 区块数字ID | position - 新的XY偏移(正负) | influence - 应用以下 (若为true，则以此行开始，以下的内容，依赖新的XY偏移为准)
  # indent - 缩进 | ls - 行间距 | ws - 字间距 | text - 显示文本
  - { "block": 1, "position": [ 0, 0 ], "influence": true, "indent": 0px, "ls": 10px, "ws": 2px, "text": "{shift:-8}榦{shift:-42}" }
  - { "block": 2, "position": [ 66, 5 ], "influence": true, "indent": 0px, "ls": 10px, "ws": 2px, "text": "{shift:4}个人邮箱" }
  - { "block": 3, "position": [ 50, 106 ], "influence": true, "indent": 0px, "ls": 10px, "ws": 2px, "text": "{shift:86}%currentPage%/%pageAmount%" }
  - { "indent": 0px, "ls": 10px, "ws": 2px, "text": "" }

images:
  menu1:
    height: 256
    ascent: 48
    char: "榦"
    file: "font/mailbox_ui"
    declareBlocks:
      - 1
