name: RookiePostBox
version: '${project.version}'
main: com.cuzz.rookiepostbox.RookiePostBox
api-version: '1.20'
depend:
  - BukkitSpring
  - OdalitaMenus
  - RookieFonts
commands:
  rookiepostbox:
    aliases: [postbox]
    permission: rookiepostbox.use
permissions:
  rookiepostbox.use:
    default: true
  rookiepostbox.send:
    default: true
  rookiepostbox.admin:
    default: op
